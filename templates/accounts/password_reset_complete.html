{% extends 'base.html' %}

{% block title %}Password Reset Complete - TourEase{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-xl shadow-lg p-8 text-center">
            <div class="mb-8">
                <i class="fas fa-check-circle text-4xl text-green-500 mb-2"></i>
                <h2 class="text-2xl font-bold text-gray-800">Password Reset Complete</h2>
                <p class="text-gray-500 mt-2">Your password has been set. You may go ahead and log in now.</p>
            </div>
            
            <a href="{% url 'login' %}" class="inline-block bg-emerald-600 text-white px-6 py-3 rounded-lg hover:bg-emerald-700 transition">
                Log In
            </a>
        </div>
    </div>
</div>
{% endblock %}
